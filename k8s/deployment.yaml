apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-openshift
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cseoc-app
  template:
    metadata:
      labels:
        app: cseoc-app
    spec:
      containers:
        - name: springboot-container
          image: sarugolufloradisowja/cseoc:latest
          ports:
            - containerPort: 8085

---
apiVersion: v1
kind: Service
metadata:
  name: springboot-service
spec:
  type: NodePort
  selector:
    app: csekub-app
  ports:
    - port: 8085
      targetPort: 8085
      nodePort: 30007